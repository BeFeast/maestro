<!DOCTYPE html>
<html data-theme="light">
<head>
<title>maestro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f7fafa">
<meta property="og:type" content="website">
<meta property="og:title" content="Maestro">
<meta property="og:description" content="The conductor for your fleet of agents.">
<meta property="og:image" content="/static/og-1200x630.png">
<meta property="og:image:alt" content="Maestro mark and tagline">
<link rel="icon" href="/static/maestro-mark.svg" type="image/svg+xml">
<link rel="icon" href="/static/favicon-16.png" type="image/png" sizes="16x16">
<link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/static/favicon-48.png" type="image/png" sizes="48x48">
<link rel="apple-touch-icon" href="/static/apple-touch-icon-180.png" sizes="180x180">
<link rel="preload" href="/static/status-icons.svg" as="image" type="image/svg+xml">
<link rel="stylesheet" href="/static/tokens.css?v=20260502-2">
<link rel="stylesheet" href="/static/components.css?v=20260502-2">
<link rel="stylesheet" href="/static/dashboard.css?v=20260502-2">

</head>
<body data-page="dashboard">
<header>
  <div class="topline">
    <img class="brand-mark" src="/static/maestro-mark.svg" alt="" aria-hidden="true">
    <h1>Maestro</h1>
    <div class="repo" id="repo"></div>
  </div>
  <div class="stats" id="stats"></div>
</header>
<main>
  <section>
    <div class="toolbar workspace">
      <h2>Workers</h2>
      <label class="filter"><input id="filter" type="search" placeholder="Filter"></label>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="slot">Slot</th>
            <th class="issue">Issue</th>
            <th class="status">Status</th>
            <th class="backend">Backend</th>
            <th class="pr">PR</th>
            <th class="runtime">Runtime</th>
            <th class="tokens">Tokens</th>
          </tr>
        </thead>
        <tbody id="workers"></tbody>
      </table>
    </div>
  </section>
  <section class="log-panel">
    <div class="log-head">
      <div class="log-title" id="log-title">Log <span></span></div>
      <div class="log-meta" id="log-meta"></div>
    </div>
	<div class="supervisor-panel" id="supervisor-panel"></div>
	<div class="outcome-panel" id="outcome-panel"></div>
	<div class="status-note" id="status-note"></div>
    <pre id="log"><span class="muted">Select a worker.</span></pre>
  </section>
</main>
<script>window.MAESTRO_REPO = __REPO_JSON__;</script>
<script src="/static/dashboard.js?v=20260502-2"></script>

</body>
</html>
